version: 2

models:
  - name: mart_companies
    description: "Aggregated developer counts and stats grouped by company"
    columns: 
   - name: company
     description: "Cleaned company name"
     tests: 
       - unique
       - not_null
   - name: developer_count
     description: "Number of unique developers at this company"
     tests:
       - not_null 
- name: mart_location 
  description: "Aggregated developer counts grouped by city"
  columns:
   - name: city
     description: "Normalized city name"
     tests:
      - unique
      - not_null